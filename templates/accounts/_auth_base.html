{% extends "store/base.html" %}

{% block extra_css %}
<style>
  body { display:flex; flex-direction:column; min-height:100vh; background: var(--bg); }
  .auth-shell {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 48px 16px;
  }
  .auth-card {
    width: 100%;
    max-width: 460px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 36px 32px;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .auth-card h1 { font-size: 24px; font-weight: 600; letter-spacing:-0.5px; margin-bottom: 6px; }
  .auth-card .lead { font-size: 14px; color: var(--ink-3); margin-bottom: 28px; }
  .auth-form { display:flex; flex-direction:column; gap:16px; }
  .auth-field { display:flex; flex-direction:column; gap:6px; }
  .auth-field label { font-size: 13px; font-weight:500; color: var(--ink-2); }
  .auth-field input {
    width:100%; height:42px; padding:0 14px;
    border:1px solid var(--border); border-radius: var(--r-md);
    background: var(--bg); font-size: 14px; color: var(--ink);
    transition: border .15s, box-shadow .15s;
  }
  .auth-field input:focus { outline:none; border-color: var(--ink); box-shadow: 0 0 0 3px var(--surface-2); }
  .auth-field .hint { font-size:12px; color: var(--ink-3); }
  .auth-error {
    background: oklch(96% 0.05 25); color: var(--red);
    border: 1px solid oklch(88% 0.08 25);
    border-radius: var(--r-md); padding: 10px 14px; font-size: 13px;
  }
  .auth-success {
    background: oklch(96% 0.06 145); color: var(--green);
    border: 1px solid oklch(86% 0.10 145);
    border-radius: var(--r-md); padding: 10px 14px; font-size: 13px;
  }
  .auth-submit {
    height: 44px; border-radius: var(--r-md);
    background: var(--ink); color: #fff; font-weight: 600; font-size: 14px;
    transition: opacity .15s;
  }
  .auth-submit:hover { opacity: .92; }
  .auth-submit:disabled { opacity: .5; cursor: not-allowed; }
  .auth-secondary {
    display:flex; justify-content:center; gap:6px;
    margin-top: 22px; font-size: 13px; color: var(--ink-3);
  }
  .auth-secondary a { color: var(--ink); font-weight: 600; }
  .auth-divider { display:flex; align-items:center; gap:12px; margin: 8px 0; color: var(--ink-3); font-size: 12px; }
  .auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background: var(--border); }
  .errorlist { color: var(--red); font-size: 12px; margin: 0; padding-left: 16px; }
  .form-row-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px){ .form-row-grid { grid-template-columns: 1fr; } }
  .top-back {
    position: absolute; top: 20px; left: 20px;
    display:inline-flex; align-items:center; gap:6px;
    font-size:13px; color: var(--ink-3);
  }
  .top-back:hover { color: var(--ink); }
  .auth-brand {
    display: inline-flex; align-items: center; gap: 10px;
    margin-bottom: 22px;
    font-family: var(--font-mono); font-size: 20px; font-weight: 600;
    color: var(--ink); letter-spacing: -0.5px;
  }
  .auth-brand img { display:block; }
  .auth-brand i { color: var(--accent); font-style: normal; }
</style>
{% endblock %}

{% block content %}
<a href="{% url 'index' %}" class="top-back">← Bosh sahifa</a>
<div class="auth-shell">
  <div class="auth-card">
    <a href="{% url 'index' %}" class="auth-brand">
      <img src="{% static 'img/logo.svg' %}" alt="uzshop" width="42" height="42">
      <span>uz<i>shop</i></span>
    </a>
    {% block auth %}{% endblock %}
  </div>
</div>
{% endblock %}
